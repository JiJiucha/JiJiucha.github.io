<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 极简跳转页，无额外样式，仅做设备判断 -->
</head>
<body>
    <script>
        (function() {
            // 获取用户代理字符串（全部转为小写，方便匹配）
            var ua = navigator.userAgent.toLowerCase();

            // 移动端设备关键词（覆盖手机/平板，但平板我们按移动处理）
            var mobileKeywords = [
                'android', 'iphone', 'ipod', 'ipad',
                'blackberry', 'windows phone', 'opera mini',
                'mobile', 'phone'
            ];

            // 判断是否为移动设备
            var isMobile = mobileKeywords.some(function(keyword) {
                return ua.indexOf(keyword) !== -1;
            });

            // 额外处理：如果用户代理包含 'tablet' 或 'ipad'，仍视为移动端（已在关键词中）
            // 但如果想更严谨，可以增加特殊判断，当前关键词已覆盖

            // 目标链接
            var mobileUrl =
                'https://ys-api.mihoyo.com/event/download_porter/link/ys_cn/official/android_backup319';
            var pcUrl =
                'https://ys-api.mihoyo.com/event/download_porter/link/ys_cn/official/pc_backup319';

            // 根据设备类型跳转
            var targetUrl = isMobile ? mobileUrl : pcUrl;

            // 执行跳转
            window.location.href = targetUrl;
        })();
    </script>
</body>
</html>
